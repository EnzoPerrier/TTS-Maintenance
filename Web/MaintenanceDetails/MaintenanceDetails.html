<!DOCTYPE html>
<html lang="fr">

<head>
  <meta charset="UTF-8">
  <title>Détails de la maintenance</title>
  <link rel="stylesheet" href="../style.css" />
  <style>
    /* ========================================
       CONTENEUR PRINCIPAL
    ======================================== */
    #MaintenanceDetails {
      background: linear-gradient(135deg, var(--gray-50) 0%, var(--white) 100%);
      border-radius: var(--radius-lg);
      padding: 2rem;
      margin-bottom: 2rem;
      box-shadow: var(--shadow-md);
      border: 2px solid var(--gray-200);
    }

    /* Grille d'affichage des détails */
    .details-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 0.75rem;
    }

    .detail-block {
      background: var(--white);
      border-radius: var(--radius-md);
      padding: 0.85rem 1rem;
      border-left: 4px solid var(--primary-blue);
      box-shadow: var(--shadow-sm);
    }

    .detail-block strong {
      display: block;
      font-size: 0.8rem;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: var(--gray-500);
      margin-bottom: 0.2rem;
    }

    .detail-block span {
      color: var(--gray-800);
      font-size: 0.97rem;
      font-weight: 500;
    }

    .details-section-title {
      font-size: 1rem;
      font-weight: 700;
      color: var(--primary-blue);
      margin: 1.25rem 0 0.75rem;
      display: flex;
      align-items: center;
      gap: 0.5rem;
      border-bottom: 2px solid var(--gray-200);
      padding-bottom: 0.4rem;
    }

    /* Horaires tableau */
    .horaires-table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 0.5rem;
      font-size: 0.9rem;
    }

    .horaires-table th {
      background: var(--primary-blue);
      color: var(--white);
      padding: 0.5rem 0.75rem;
      font-weight: 600;
      text-align: center;
    }

    .horaires-table td {
      padding: 0.5rem 0.75rem;
      text-align: center;
      border: 1px solid var(--gray-200);
      color: var(--gray-700);
    }

    .horaires-table tr:nth-child(even) td {
      background: var(--gray-50);
    }

    .horaires-table .row-label {
      font-weight: 600;
      color: var(--gray-600);
      text-align: left;
      background: var(--gray-50);
    }

    /* Nature des travaux badges */
    .travaux-badges {
      display: flex;
      flex-wrap: wrap;
      gap: 0.5rem;
      margin-top: 0.5rem;
    }

    .travaux-badge {
      background: var(--primary-blue);
      color: var(--white);
      border-radius: 999px;
      padding: 0.3rem 0.8rem;
      font-size: 0.85rem;
      font-weight: 500;
    }

    /* Tags opérateurs */
    .operators-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 0.5rem;
      margin-top: 0.3rem;
    }

    .operator-tag {
      background: var(--gray-700);
      color: var(--white);
      border-radius: var(--radius-sm);
      padding: 0.25rem 0.65rem;
      font-size: 0.9rem;
      font-weight: 700;
      letter-spacing: 1px;
    }

    /* ========================================
       GESTION DES PHOTOS
    ======================================== */
    .photo-container {
      margin-top: 1.5rem;
      padding: 1.5rem;
      background: var(--gray-50);
      border-radius: var(--radius-md);
      border: 2px dashed var(--gray-300);
      transition: var(--transition);
    }

    .photo-container:hover {
      border-color: var(--primary-blue);
      background: var(--white);
    }

    .photo-label {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      margin-bottom: 0.75rem;
      font-weight: 600;
      color: var(--gray-800);
      font-size: 1.05rem;
    }

    .photo-label::before {
      content: "📷";
      font-size: 1.5rem;
    }

    #photoInput,
    #editPhotoInput {
      width: 100%;
      padding: 0.75rem;
      border: 2px solid var(--gray-200);
      border-radius: var(--radius-md);
      font-size: 0.95rem;
      cursor: pointer;
      transition: var(--transition);
      background: var(--white);
    }

    #photoPreview {
      display: flex;
      flex-wrap: wrap;
      gap: 0.5rem;
      margin-top: 1rem;
    }

    .photo-preview {
      max-width: 150px;
      max-height: 150px;
      border-radius: var(--radius-md);
      box-shadow: var(--shadow-md);
      object-fit: cover;
      border: 3px solid var(--white);
      transition: var(--transition);
    }

    .photos-grid {
      display: flex !important;
      flex-direction: row !important;
      flex-wrap: nowrap !important;
      gap: 0.75rem;
      margin-top: 1rem;
      overflow-x: auto;
      padding-bottom: 0.5rem;
    }

    .photo-item {
      position: relative;
      background: var(--white);
      border-radius: var(--radius-md);
      overflow: hidden;
      box-shadow: var(--shadow-sm);
      transition: var(--transition);
      flex-shrink: 0;
      width: 150px;
      height: 150px;
    }

    .photo-item:hover {
      transform: translateY(-4px);
      box-shadow: var(--shadow-md);
    }

    .photo-item img {
      width: 100% !important;
      height: 100% !important;
      object-fit: cover !important;
      display: block !important;
      cursor: pointer !important;
    }

    .photo-actions {
      position: absolute;
      top: 0.5rem;
      right: 0.5rem;
      display: flex;
      gap: 0.5rem;
      z-index: 10;
    }

    .photo-actions button {
      padding: 0.5rem;
      border-radius: 50%;
      width: 35px;
      height: 35px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.2rem;
      box-shadow: var(--shadow-md);
      background: rgba(220, 53, 69, 0.9);
      backdrop-filter: blur(4px);
      border: 2px solid white;
    }

    .photo-description {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      padding: 0.5rem;
      font-size: 0.75rem;
      color: var(--white);
      background: linear-gradient(to top, rgba(0, 0, 0, 0.9), transparent);
      margin: 0 !important;
    }

    /* ========================================
       LISTE DES PRODUITS
    ======================================== */
    #ListeProduits details {
      background: var(--white);
      border: 2px solid var(--gray-200);
      border-radius: var(--radius-lg);
      padding: 1.25rem;
      margin-bottom: 1rem;
      transition: var(--transition);
      box-shadow: var(--shadow-sm);
    }

    #ListeProduits details:hover {
      border-color: var(--primary-blue);
      box-shadow: var(--shadow-md);
      transform: translateX(4px);
    }

    #ListeProduits details[open] {
      background: var(--gray-50);
      border-color: var(--primary-blue);
    }

    #ListeProduits summary {
      font-weight: 600;
      color: var(--primary-blue);
      cursor: pointer;
      padding: 0.75rem;
      border-radius: var(--radius-sm);
      transition: var(--transition);
      user-select: none;
      font-size: 1.15rem;
    }

    #ListeProduits details>div {
      padding: 1.5rem 1rem 1rem;
      margin-top: 1rem;
      border-top: 2px solid var(--gray-200);
    }

    #ListeProduits details>div>div {
      padding: 0.75rem 0;
      border-bottom: 1px solid var(--gray-100);
      display: block;
    }

    #ListeProduits details>div>div:last-child {
      border-bottom: none;
      padding-top: 1.5rem;
    }

    #ListeProduits strong {
      color: var(--gray-600);
      font-weight: 600;
      display: block;
      margin-bottom: 0.25rem;
    }

    #ListeProduits details>div>div span {
      display: block;
      color: var(--gray-800);
      padding-left: 0.5rem;
    }

    .produit-maintenance-section {
      margin-top: 1.5rem;
      padding: 1rem;
      background: var(--gray-50);
      border-radius: var(--radius-md);
      border-left: 4px solid var(--primary-blue);
    }

    .produit-maintenance-section h5 {
      color: var(--primary-blue);
      margin-bottom: 0.75rem;
      font-size: 1.1rem;
    }

    /* ========================================
       STYLES DU FORMULAIRE MAINTENANCE (PARTIAL)
       Ces styles sont nécessaires ici car le partial
       est injecté dans le DOM de cette page.
    ======================================== */
    #maintenanceFormOverlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.6);
      backdrop-filter: blur(4px);
      z-index: 9999;
      align-items: center;
      justify-content: center;
    }

    #maintenanceFormOverlay .maintenance-form-modern {
      background: var(--white);
      padding: 2.5rem;
      border-radius: var(--radius-lg);
      box-shadow: var(--shadow-lg);
      max-width: 1000px;
      width: 95%;
      max-height: 92vh;
      overflow-y: auto;
      animation: slideUp 0.3s ease;
    }

    @keyframes slideUp {
      from { opacity: 0; transform: translateY(30px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    @keyframes fadeIn {
      from { opacity: 0; }
      to   { opacity: 1; }
    }

    .maintenance-form-modern h3 {
      font-size: 1.6rem;
      margin-bottom: 1.5rem;
      color: var(--primary-blue);
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .form-section {
      background: var(--gray-50);
      border-radius: var(--radius-md);
      padding: 1.5rem;
      margin-bottom: 1.5rem;
      border: 1px solid var(--gray-200);
    }

    .section-header {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      margin-bottom: 1.25rem;
      padding-bottom: 0.75rem;
      border-bottom: 2px solid var(--primary-blue);
    }

    .section-icon { font-size: 1.4rem; }

    .section-header h4 {
      margin: 0;
      color: var(--primary-blue);
      font-size: 1.05rem;
      font-weight: 700;
    }

    .form-row {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 1rem;
      margin-bottom: 1rem;
    }

    .form-row-3 { grid-template-columns: repeat(3, 1fr); }
    .form-row-4 { grid-template-columns: repeat(4, 1fr); }

    .form-group { display: flex; flex-direction: column; }
    .form-group.full-width { grid-column: 1 / -1; }

    .form-group label {
      margin-bottom: 0.4rem;
      font-weight: 500;
      color: var(--gray-700);
      font-size: 0.9rem;
    }

    .required-star { color: #e53e3e; margin-left: 2px; }

    .form-group input,
    .form-group select,
    .form-group textarea {
      padding: 0.7rem 0.85rem;
      border: 2px solid var(--gray-200);
      border-radius: var(--radius-sm);
      font-size: 0.95rem;
      transition: var(--transition);
      background: var(--white);
      color: var(--gray-800);
    }

    .form-group input:focus,
    .form-group select:focus,
    .form-group textarea:focus {
      outline: none;
      border-color: var(--primary-blue);
      box-shadow: 0 0 0 3px rgba(0, 102, 204, 0.1);
    }

    .operators-tags-input { min-height: 80px; resize: vertical; font-family: inherit; }
    .operators-hint { font-size: 0.8rem; color: var(--gray-500); margin-top: 0.3rem; font-style: italic; }

    .horaires-7jours { overflow-x: auto; }
    .horaires-7jours table {
      width: 100%;
      border-collapse: collapse;
      min-width: 700px;
      font-size: 0.88rem;
    }

    .horaires-7jours th {
      background: var(--primary-blue);
      color: white;
      padding: 0.5rem 0.6rem;
      text-align: center;
      font-weight: 600;
    }

    .horaires-7jours th:first-child { background: var(--gray-600); text-align: left; }
    .horaires-7jours td { padding: 0.35rem 0.4rem; border: 1px solid var(--gray-200); text-align: center; }
    .horaires-7jours tr:nth-child(even) td { background: var(--gray-50); }
    .horaires-7jours .period-sub {
      background: var(--gray-100);
      font-weight: 600;
      color: var(--gray-600);
      text-align: left;
      padding-left: 0.75rem;
    }

    .horaires-7jours input[type="time"] {
      border: 1px solid var(--gray-300);
      border-radius: 4px;
      padding: 0.3rem 0.4rem;
      font-size: 0.85rem;
      width: 100%;
      min-width: 80px;
      background: var(--white);
    }

    .travaux-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 0.6rem; }
    .travaux-col { display: flex; flex-direction: column; gap: 0.5rem; }

    .checkbox-item {
      display: flex;
      flex-direction: row;
      align-items: center;
      gap: 0.6rem;
      cursor: pointer;
      padding: 0.6rem 0.85rem;
      background: var(--white);
      border-radius: var(--radius-sm);
      border: 2px solid var(--gray-200);
      transition: var(--transition);
      font-size: 0.95rem;
      font-weight: 500;
      color: var(--gray-800);
      user-select: none;
      box-sizing: border-box;
      width: 100%;
    }

    .checkbox-item:hover { border-color: var(--primary-blue); background: rgba(0, 102, 204, 0.04); }
    .checkbox-item input[type="checkbox"] { width: 18px; height: 18px; min-width: 18px; cursor: pointer; accent-color: var(--primary-blue); flex-shrink: 0; margin: 0; }
    .checkbox-item span { flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .checkbox-item.checked { border-color: var(--primary-blue); background: rgba(0, 102, 204, 0.08); }

    .garantie-row { display: flex; gap: 1rem; margin-top: 0.5rem; }
    .garantie-option {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      cursor: pointer;
      padding: 0.6rem 1.2rem;
      background: var(--white);
      border-radius: var(--radius-sm);
      border: 2px solid var(--gray-200);
      transition: var(--transition);
      font-weight: 500;
    }
    .garantie-option:hover { border-color: var(--primary-blue); background: rgba(0, 102, 204, 0.04); }
    .garantie-option input { accent-color: var(--primary-blue); width: 16px; height: 16px; cursor: pointer; }

    .form-actions {
      display: flex;
      gap: 1rem;
      margin-top: 2rem;
      padding-top: 1.5rem;
      border-top: 2px solid var(--gray-200);
    }

    .form-actions button {
      flex: 1;
      padding: 0.875rem 1.5rem;
      font-size: 1rem;
      font-weight: 600;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
    }

    .btn-secondary { background: var(--gray-600) !important; }
    .btn-secondary:hover { background: var(--gray-800) !important; }
    .btn-edit-produit { background: var(--gray-600) !important; }
    .btn-remove-produit { background: var(--danger) !important; }

    /* ========================================
       MODAL PHOTO EN GRAND
    ======================================== */
    .photo-modal {
      display: none;
      position: fixed;
      z-index: 10000;
      left: 0; top: 0;
      width: 100%; height: 100%;
      background-color: rgba(0, 0, 0, 0.95);
      align-items: center;
      justify-content: center;
      backdrop-filter: blur(5px);
    }

    .photo-modal-content {
      max-width: 95%;
      max-height: 95%;
      object-fit: contain;
      border-radius: var(--radius-lg);
    }

    .photo-modal-close {
      position: absolute;
      top: 30px; right: 50px;
      color: var(--white);
      font-size: 50px;
      font-weight: bold;
      cursor: pointer;
      background: rgba(0, 0, 0, 0.5);
      width: 60px; height: 60px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .photo-modal-close:hover { background: rgba(220, 53, 69, 0.8); }
    .photo-help-text { font-size: 0.9rem; color: var(--gray-600); margin-top: 0.5rem; font-style: italic; }

    /* ========================================
       RESPONSIVE
    ======================================== */
    @media (max-width: 768px) {
      .form-row-3, .form-row-4 { grid-template-columns: 1fr 1fr; }
      .travaux-grid { grid-template-columns: 1fr; }
      .details-grid { grid-template-columns: 1fr 1fr; }
    }

    @media (max-width: 480px) {
      .form-row, .form-row-3, .form-row-4 { grid-template-columns: 1fr; }
      .details-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>

<body>
  <button id="backBtn">← Retour</button>

  <main>
    <section class="active">
      <h1>📋 Détails de la maintenance</h1>
      <div id="MaintenanceDetails"></div>

      <span style="display:flex; align-items:center; gap:1rem; flex-wrap:wrap;">
        <button class="primary" onclick="showEditMaintenanceForm(maintenance)" style="background: var(--gray-600);">
          ✏️ Modifier la maintenance
        </button>

        <div id="riActions" style="display:flex; overflow:hidden; border-radius:8px;">
          <button id="btnApercuRI"
            style="background:#198754;color:white;padding:0.6rem 1rem;border:none;border-right:1px solid rgba(255,255,255,0.3);cursor:pointer;">
            👁 Aperçu RI
          </button>
          <button id="btnPdfRI"
            style="background:#157347;color:white;padding:0.6rem 1rem;border:none;cursor:pointer;">
            ⬇ PDF
          </button>
        </div>
      </span>

      <h2 style="margin-top: 2rem;">🔧 Produits associés</h2>
      <button class="primary" onclick="showAddProduitForm()" style="margin: 1rem 0;">
        ➕ Associer un produit
      </button>
      <div id="ListeProduits"></div>
    </section>
  </main>

  <!-- =============================================
       FORMULAIRE MAINTENANCE — chargé depuis Partials/
       Le HTML du formulaire est injecté ici dynamiquement
       par loadMaintenanceForm() au démarrage de la page.
  ============================================== -->
  <div id="maintenance-form-container"></div>

  <!-- Formulaire pour associer un produit -->
  <div id="addProduitForm" class="modal">
    <form id="produitAssocForm" onsubmit="addProduitToMaintenance(event)">
      <h3>Associer un produit à cette maintenance</h3>

      <label for="produitSelect" class="form-label">📦 Produit</label>
      <select id="produitSelect" required>
        <option value="">-- Sélectionner un produit --</option>
      </select>

      <label for="produitEtat" class="form-label">🔍 État du produit</label>
      <select id="produitEtat">
        <option value="">-- État --</option>
        <option value="OK">✅ OK</option>
        <option value="NOK">❌ NOK</option>
        <option value="Passable">⚠️ Passable</option>
        <option value="Non vérifié">❓ Non vérifié</option>
      </select>

      <label for="produitCommentaire" class="form-label">💬 Commentaire général</label>
      <textarea id="produitCommentaire" placeholder="Commentaire sur l'état du produit"></textarea>

      <label for="produitEtatConstate" class="form-label">📋 État constaté</label>
      <textarea id="produitEtatConstate" placeholder="Décrivez l'état constaté lors de la maintenance"></textarea>

      <label for="produitTravauxEffectues" class="form-label">🔧 Travaux effectués</label>
      <textarea id="produitTravauxEffectues" placeholder="Détaillez les travaux effectués sur ce produit"></textarea>

      <label for="produitRiInterne" class="form-label">📝 RI interne</label>
      <input type="text" id="produitRiInterne" placeholder="RI interne non visible par le client" />

      <div class="photo-container">
        <label class="photo-label" for="photoInput">Ajouter des photos (optionnel)</label>
        <p class="photo-help-text">💡 Vous pouvez sélectionner jusqu'à 5 photos simultanément</p>
        <input type="file" id="photoInput" accept="image/*" multiple />
        <div id="photoPreview"></div>
        <textarea id="photoDescriptionAddProduit" placeholder="Commentaire pour toutes les photos (optionnel)"></textarea>
      </div>

      <button class="primary" type="submit">✓ Associer</button>
      <button type="button" onclick="hideAddProduitForm()">✕ Annuler</button>
    </form>
  </div>

  <!-- Formulaire pour modifier l'état d'un produit -->
  <div id="editProduitForm" class="modal">
    <form id="produitEditForm" onsubmit="updateProduitMaintenance(event)">
      <h3>Modifier les informations du produit</h3>
      <input type="hidden" id="editProduitId" />
      <p><strong>Produit :</strong><span id="editProduitNom"></span></p>

      <label for="editProduitEtat" class="form-label">🔍 État du produit</label>
      <select id="editProduitEtat" required>
        <option value="">-- État --</option>
        <option value="OK">✅ OK</option>
        <option value="NOK">❌ NOK</option>
        <option value="Passable">⚠️ Passable</option>
        <option value="Non vérifié">❓ Non vérifié</option>
      </select>

      <label for="editProduitCommentaire" class="form-label">💬 Commentaire général</label>
      <textarea id="editProduitCommentaire" placeholder="Commentaire sur l'état du produit"></textarea>

      <label for="editProduitEtatConstate" class="form-label">📋 État constaté</label>
      <textarea id="editProduitEtatConstate" placeholder="Décrivez l'état constaté lors de la maintenance"></textarea>

      <label for="editProduitTravauxEffectues" class="form-label">🔧 Travaux effectués</label>
      <textarea id="editProduitTravauxEffectues" placeholder="Détaillez les travaux effectués sur ce produit"></textarea>

      <label for="editProduitRiInterne" class="form-label">📝 RI interne</label>
      <input type="text" id="editProduitRiInterne" placeholder="RI Interne" />

      <button class="primary" type="submit">✓ Mettre à jour</button>
      <button type="button" onclick="hideEditProduitForm()">✕ Annuler</button>
    </form>
  </div>

  <!-- Modal photo en grand -->
  <div id="photoModal" class="photo-modal" onclick="closePhotoModal()">
    <span class="photo-modal-close">&times;</span>
    <img class="photo-modal-content" id="modalPhoto" alt="Photo agrandie">
  </div>

  <!-- =============================================
       SCRIPTS
       1. Le partial JS (fonctions du formulaire)
       2. Le JS spécifique à cette page
  ============================================== -->
  <script src="../Partials/MaintenanceForm.js"></script>
  <script src="MaintenanceDetails.js" defer></script>
</body>

</html>
