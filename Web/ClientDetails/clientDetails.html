<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Détails du client</title>
  <link rel="stylesheet" href="../DarkModernStyle.css" />

  <link rel="icon" href="/Ressources/favicon.png" type="image/x-icon">
</head>
<body>
  <button id="backBtn">← Retour</button>

  <main>
    <section class="active">
      <h1>👤 Détails du client</h1>
      <div id="clientDetails"></div>

      <div class="site-stats-container">
        <h3 class="stats-section-title">📊 Vue d'ensemble</h3>
        <div class="stats-grid-site">

          <div class="stat-card-modern stat-card-info">
            <div class="stat-header">
              <span class="stat-icon-modern">🏢</span>
              <span class="stat-label-modern">Sites</span>
            </div>
            <div class="stat-details">
              <div class="stat-main-value" id="statsSites">0</div>
            </div>
          </div>

          <div class="stat-card-modern stat-card-info">
            <div class="stat-header">
              <span class="stat-icon-modern">📦</span>
              <span class="stat-label-modern">Équipements</span>
            </div>
            <div class="stat-details">
              <div class="stat-main-value" id="statsEquipements">0</div>
              <div class="stat-breakdown">
                <div class="stat-item stat-success">
                  <span class="dot"></span>
                  <span class="label">OK</span>
                  <span class="value" id="statsOK">0</span>
                </div>
                <div class="stat-item stat-warning">
                  <span class="dot"></span>
                  <span class="label">Passable</span>
                  <span class="value" id="statsPassable">0</span>
                </div>
                <div class="stat-item stat-danger">
                  <span class="dot"></span>
                  <span class="label">NOK</span>
                  <span class="value" id="statsNOK">0</span>
                </div>
              </div>
            </div>
          </div>

          <div class="stat-card-modern stat-card-primary">
            <div class="stat-header">
              <span class="stat-icon-modern">🔧</span>
              <span class="stat-label-modern">Maintenances</span>
            </div>
            <div class="stat-details">
              <div class="stat-main-value" id="statsMaintenances">0</div>
              <div class="stat-breakdown">
                <div class="stat-item stat-success">
                  <span class="dot"></span>
                  <span class="label">Terminées</span>
                  <span class="value" id="statsTerminees">0</span>
                </div>
                <div class="stat-item stat-warning">
                  <span class="dot"></span>
                  <span class="label">En cours</span>
                  <span class="value" id="statsEnCours">0</span>
                </div>
                <div class="stat-item stat-info">
                  <span class="dot"></span>
                  <span class="label">Planifiées</span>
                  <span class="value" id="statsPlanifiees">0</span>
                </div>
              </div>
            </div>
          </div>

        </div>
      </div>

      <details>
        <summary>🏢 Sites associés</summary>
        <div id="SitesList"></div>
      </details>

      <details>
        <summary>📦 Équipements</summary>
        <div id="EquipementsList"></div>
      </details>

      <details>
        <summary>🔧 Maintenances</summary>
        <div id="MaintenancesList"></div>
      </details>
    </section>
  </main>

<footer style="
  background: var(--gray-200, #2D3748);
  color: var(--gray-300, #FFFFFF);
  text-align: center;
  padding: 1.5rem;
  margin-top: 3rem;
  border-top: 3px solid var(--primary-blue, #3B82F6);
">
  <a href="https://github.com/EnzoPerrier" 
     target="_blank" 
     rel="noopener noreferrer"
     style="
       color: var(--white, #FFFFFF);
       text-decoration: none;
       font-size: 0.95rem;
       transition: color 0.3s ease;
       display: inline-block;
     "
     onmouseover="this.style.color='var(--primary-blue, #3B82F6)'"
     onmouseout="this.style.color='var(--white, #FFFFFF)'">
    © 2026 Enzo Perrier - Tous droits réservés
  </a>
</footer>

  <!-- Conteneur du formulaire maintenance (injecté par maintenanceForm.js) -->
  <div id="maintenance-form-container"></div>

  <script src="../utils/apiFetch.js"></script>
  <script src="../Partials/MaintenanceForm.js" defer></script>
  <script src="clientDetails.js" defer></script>
</body>
</html>
